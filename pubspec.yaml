name: studio
description: "Studio — gestione prenotazioni e corsi per AL.FA.SE asd."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  sentry_flutter: ^9.19.0
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  table_calendar: ^3.1.2
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

dev_dependencies:
  sentry_dart_plugin: ^3.3.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^0.3.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: dogs-qv
